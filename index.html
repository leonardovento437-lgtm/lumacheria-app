<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lumacheria Italiana – Cherasco</title>

<style>
:root{
  --verde:#1B5E35;--verde-mid:#2D7A4A;--verde-light:#D6EFE0;--verde-pale:#EAF7EF;
  --rosso:#8B1A1A;--rosso-mid:#B02020;--rosso-light:#F5DADA;--rosso-pale:#FDF0F0;
  --lumaca:#7A5C3A;--lumaca-mid:#9B7248;--lumaca-light:#E8D9C4;--lumaca-pale:#F5EEE3;--lumaca-dark:#4A3520;
  --oro:#C9951A;--oro-light:#FBF0D0;
  --bianco:#FFFFFF;--sfondo:#F2EAD8;--card:#FFFDF7;--bordo:#D9CDB8;
  --testo:#2A1F10;--testo-sec:#6B5438;--ombra:rgba(42,30,16,0.13);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--sfondo)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif,sans-serif;color:var(--testo);max-width:430px;margin:0 auto;min-height:100vh}

/* ===== HEADER HOME ===== */
.header{background:linear-gradient(180deg,#1B5E35 0%,#2D7A4A 45%,#8B1A1A 100%);padding:0;text-align:center;position:relative;overflow:hidden}
.header-top-bar{background:rgba(0,0,0,0.18);padding:10px 16px 8px;display:flex;justify-content:space-between;align-items:center}
.header-snails{font-size:28px;letter-spacing:6px;line-height:1}
.header-logo-wrap{padding:22px 20px 18px;position:relative}
.header-logo-wrap::before,.header-logo-wrap::after{content:'';position:absolute;border-radius:50%;background:rgba(255,255,255,0.06)}
.header-logo-wrap::before{width:200px;height:200px;top:-60px;left:-60px}
.header-logo-wrap::after{width:150px;height:150px;bottom:-40px;right:-40px}
.logo-img{width:155px;height:155px;object-fit:contain;border-radius:20px;display:block;margin:0 auto;box-shadow:0 6px 28px rgba(0,0,0,0.35),0 0 0 3px rgba(255,255,255,0.15);position:relative;z-index:1}
.header-bottom-bar{background:rgba(0,0,0,0.2);padding:8px 16px;display:flex;justify-content:space-between;align-items:center}
.header-bottom-bar span{font-family:'Playfair Display',serif;font-size:11px;color:rgba(255,255,255,0.8);letter-spacing:.12em}

/* ===== HOME SECTION ===== */
.home-section{padding:18px 16px 24px;display:flex;flex-direction:column;gap:13px}
.home-card{border-radius:20px;padding:18px;display:flex;align-items:center;gap:15px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;box-shadow:0 3px 14px var(--ombra);border:1.5px solid transparent}
.home-card:active{transform:scale(0.98)}
.hc-prodotti{background:linear-gradient(135deg,#1B5E35,#3A9060);border-color:#1B5E35}
.hc-dettaglio{background:linear-gradient(135deg,#8B1A1A,#C13030);border-color:#8B1A1A}
.hc-clienti{background:linear-gradient(135deg,#7A5C3A,#B08448);border-color:#7A5C3A}
.home-card-icon{width:50px;height:50px;border-radius:14px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.home-card-icon svg{stroke:white;width:26px;height:26px}

/* ===== PAGES ===== */

.page.active{display:flex}

.back-btn{width:34px;height:34px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.15);cursor:pointer;display:flex;align-items:center;justify-content:center;color:white;font-size:18px;flex-shrink:0}

/* LUMACA NELL'HEADER PAGINE */
.ph-snail{font-size:28px;line-height:1;flex-shrink:0;opacity:0.85}

/* ===== PAGE BODY ===== */
.page-body{flex:1;padding:14px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ===== SEARCH ===== */
.search-wrap{position:relative;margin-bottom:14px}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.search-bar{width:100%;padding:11px 12px 11px 36px;border:1.5px solid var(--bordo);border-radius:14px;background:var(--card);color:var(--testo);font-size:13px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif,sans-serif;outline:none;box-shadow:0 1px 4px var(--ombra)}

/* ===== PILLS ===== */
.pills-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.pill{padding:6px 13px;border-radius:20px;border:1.5px solid var(--bordo);background:var(--card);font-size:11px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif,sans-serif;color:var(--testo-sec);cursor:pointer;white-space:nowrap;transition:all .15s}
.pill.active{background:var(--verde);color:white;border-color:var(--verde);font-weight:700}
.result-count{font-size:11px;color:var(--testo-sec);margin-bottom:10px;font-weight:300}

/* ===== EMPTY ===== */
.empty{text-align:center;padding:40px 0;color:var(--testo-sec);font-size:13px}
.empty-snail{font-size:54px;display:block;margin-bottom:10px;line-height:1}

/* ===== PRODOTTI CARD ===== */
.prod-card{background:var(--card);border:1px solid var(--bordo);border-radius:18px;margin-bottom:13px;overflow:hidden;box-shadow:0 2px 10px var(--ombra)}
.prod-card-header{padding:12px 14px 10px;background:linear-gradient(135deg,var(--lumaca-pale),var(--sfondo));border-bottom:1px solid var(--bordo);position:relative;overflow:hidden}
/* LUMACA GRANDE NELLA CARD PRODOTTO */
.card-snail{position:absolute;right:6px;bottom:-2px;font-size:48px;line-height:1;pointer-events:none;opacity:0.45}
.prod-nome{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;color:var(--lumaca-dark);line-height:1.35;margin-bottom:4px;padding-right:50px}
.prod-cod-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.prod-cod{font-size:10px;color:var(--testo-sec);font-weight:400;letter-spacing:.04em}
.prod-unita{background:var(--lumaca-light);border:1px solid var(--bordo);border-radius:5px;padding:1px 7px;font-size:10px;color:var(--lumaca);font-weight:700}
.prod-card-body{padding:11px 14px 13px}
.section-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:5px;color:var(--testo-sec)}
.cost-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:5px}
.cost-box{border-radius:11px;padding:8px 6px;text-align:center}
.cb-lbl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px;opacity:.85}
.cb-val{font-size:18px;font-weight:700;font-family:'Playfair Display',seriffont-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;}
.cb-na{background:var(--sfondo)}.cb-na .cb-lbl{color:var(--bordo)}.cb-na .cb-val{color:var(--bordo)font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;}
.cb-cvu{background:var(--verde-pale);border:1px solid var(--verde-light)}.cb-cvu .cb-lbl,.cb-cvu .cb-val{color:var(--verde)font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;}
.cb-cfu{background:var(--oro-light);border:1px solid #F0D070}.cb-cfu .cb-lbl,.cb-cfu .cb-val{color:#8B6200font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;}
.cb-ct{background:#EDE8F8;border:1px solid #C8BAEA}.cb-ct .cb-lbl,.cb-ct .cb-val{color:#4A2A90font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;}
.cb-ct1{background:#FDE8E8;border:1px solid #EAB8B8}.cb-ct1 .cb-lbl,.cb-ct1 .cb-val{color:#8B1A1Afont-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;}
.cb-ct2{background:#E8EDF8;border:1px solid #B8C8EA}.cb-ct2 .cb-lbl,.cb-ct2 .cb-val{color:#1A3A7Afont-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;}
.prod-divider{height:1px;background:var(--bordo);margin:9px 0}
.prezzo-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cb-pc{background:#E6F0FA;border:1px solid #A8C8EA}.cb-pc .cb-lbl,.cb-pc .cb-val{color:#0A3060font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;}
.cb-prof-pos{background:var(--verde-pale);border:1px solid var(--verde-light)}.cb-prof-pos .cb-lbl,.cb-prof-pos .cb-val{color:var(--verde)font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;}
.cb-prof-neg{background:var(--rosso-pale);border:1px solid var(--rosso-light)}.cb-prof-neg .cb-lbl,.cb-prof-neg .cb-val{color:var(--rosso)font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;}

/* ===== DETTAGLIO CARD ===== */
.det-card{background:var(--card);border:1px solid var(--bordo);border-radius:18px;margin-bottom:13px;overflow:hidden;box-shadow:0 2px 10px var(--ombra)}
.det-card-hd{padding:13px 14px;display:flex;align-items:flex-start;justify-content:space-between;cursor:pointer;gap:10px;background:linear-gradient(135deg,var(--rosso-pale),var(--sfondo));border-bottom:1px solid transparent;transition:border-color .2s;position:relative;overflow:hidden}
/* LUMACA NEL DETTAGLIO */
.det-card-snail{position:absolute;right:46px;bottom:-2px;font-size:40px;line-height:1;pointer-events:none;opacity:0.35}
.det-card-hd.open{border-color:var(--bordo)}
.det-cod{font-size:10px;color:var(--testo-sec);font-weight:400;letter-spacing:.04em;margin-bottom:2px}
.det-nome{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;color:var(--rosso);line-height:1.3;padding-right:10px}
.det-toggle{width:30px;height:30px;border-radius:9px;flex-shrink:0;background:var(--rosso-light);border:1.5px solid var(--rosso-light);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;margin-top:1px}
.det-toggle svg{stroke:var(--rosso);width:14px;height:14px;transition:transform .25s}
.det-toggle.open{background:var(--rosso);border-color:var(--rosso)}
.det-toggle.open svg{stroke:white;transform:rotate(180deg)}
.det-body{display:none;padding:0 14px 14px;border-top:none}
.det-body.open{display:block}
.det-cat-block{margin-top:11px}
.det-cat-label{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-bottom:7px;border:1px solid transparent}
/* LUMACA NELLA LABEL CATEGORIA */
.det-cat-snail{font-size:14px;line-height:1}
.price-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.price-box{border-radius:11px;padding:8px 5px;text-align:center;border:1px solid transparent}
.pb-lbl{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;opacity:.85}
.pb-val{font-size:14px;font-weight:700;font-family:'Playfair Display',serif}
.pb-min{background:#FDF5E6;border-color:#EDD890}.pb-min .pb-lbl,.pb-min .pb-val{color:#7A5000}
.pb-medio{background:#E6EEF8;border-color:#A8C0E0}.pb-medio .pb-lbl,.pb-medio .pb-val{color:#0A2860}
.pb-max{background:var(--verde-pale);border-color:var(--verde-light)}.pb-max .pb-lbl,.pb-max .pb-val{color:var(--verde)}
.cat-gd{background:#FFF8E0;color:#7A5800;border-color:#EDD890!important}
.cat-gr{background:#E6EEF8;color:#0A2860;border-color:#A8C0E0!important}
.cat-ri{background:var(--rosso-pale);color:var(--rosso);border-color:var(--rosso-light)!important}
.cat-al{background:var(--verde-pale);color:var(--verde);border-color:var(--verde-light)!important}
.cat-sa{background:#F0E8F8;color:#4A1A7A;border-color:#C8A8EA!important}
.cat-pr{background:#E8F0F8;color:#0A2860;border-color:#A8C0E0!important}
.cat-sg{background:var(--lumaca-pale);color:var(--lumaca-dark);border-color:var(--lumaca-light)!important}
.cat-ec{background:#E0F5F0;color:#0A4A38;border-color:#90D8C8!important}
.cat-dp{background:#FCE8E8;color:#5A0A0A;border-color:#EAA8A8!important}
.cat-ae{background:#E0E8F8;color:#0A1A5A;border-color:#90A8E0!important}

/* ===== CLIENTI ===== */
.client-card{background:var(--card);border:1px solid var(--bordo);border-radius:16px;padding:13px 14px;margin-bottom:10px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;box-shadow:0 1px 6px var(--ombra)}
.client-card:hover,.client-card:active{border-color:var(--lumaca-mid);box-shadow:0 3px 14px var(--ombra)}
/* LUMACA CLIENTE CARD */
.client-snail{position:absolute;right:8px;bottom:2px;font-size:44px;line-height:1;pointer-events:none;opacity:0.40}
.client-nome{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:var(--testo)}
.client-sub{font-size:11px;color:var(--testo-sec);margin-top:3px;font-weight:300}

/* ===== CLIENTE DETAIL ===== */
.cliente-info-bar{background:linear-gradient(135deg,var(--lumaca-pale),var(--sfondo));border:1px solid var(--bordo);border-radius:14px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px var(--ombra)}
.cliente-avatar{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--lumaca),var(--lumaca-mid));display:flex;align-items:center;justify-content:center;color:white;font-family:'Playfair Display',serif;font-weight:700;font-size:15px;flex-shrink:0;box-shadow:0 2px 8px var(--ombra)}
.cliente-info-nome{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;color:var(--testo)}
.cliente-info-sub{font-size:11px;color:var(--testo-sec);font-weight:300;margin-top:1px}
.acquisto-card{background:var(--card);border:1px solid var(--bordo);border-radius:16px;padding:13px 14px;margin-bottom:10px;position:relative;overflow:hidden;box-shadow:0 1px 6px var(--ombra)}
/* LUMACA ACQUISTO CARD */
.acquisto-snail{position:absolute;right:8px;bottom:2px;font-size:44px;line-height:1;pointer-events:none;opacity:0.38}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bordo);border-radius:4px}
</style>
</head>

var CATEGORIE=["Allevatore Estero", "Allevatori", "Grossista / Distributore", "N/D", "Privati", "Ristoratori", "Sagre"];
var CAT_CLS={'Grande Distribuzione':'cat-gd','GROSSISTA-+DISTRIBUTORE':'cat-gr','Grossista / Distributore':'cat-gr','RISTORATORI':'cat-ri','Ristoratori':'cat-ri','ALLEVATORI':'cat-al','Allevatori':'cat-al','SOCIO ANE':'cat-sa','Soci ANE':'cat-sa','PRIVATI':'cat-pr','Privati':'cat-pr','SAGRE':'cat-sg','Sagre':'cat-sg','E-COMMERCE FOOD':'cat-ec','E-commerce Food':'cat-ec','DETTAGLIO-PUNTO VENDITA':'cat-dp','Dettaglio / Punto Vendita':'cat-dp','ALLEVATORE ESTERO':'cat-ae','Allevatore Estero':'cat-ae'};

var selCat=CATEGORIE[0],selCliente=null;
document.getElementById('logo-img').src=LOGO_SRC;
function e(v){if(v==null||v===''||isNaN(Number(v)))return '-'; return '€' + parseFloat(v).toFixed(2).replace('.',',');}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>{p.classList.remove('active');p.style.display='none';});
  const pg=document.getElementById(id);pg.style.display='flex';pg.classList.add('active');
  if(id==='prodotti'){document.querySelector('#prodotti .search-bar').value='';renderProdotti('');}
  if(id==='dettaglio'){document.querySelector('#dettaglio .search-bar').value='';renderDettaglio('');}
  if(id==='clienti'){buildCatPills();renderClienti(document.getElementById('clienti-search').value||'');}
  window.scrollTo(0,0);
}

function renderProdotti(q){
  q=(q||'').toLowerCase();
  const list=DB.filter(p=>p.nome.toLowerCase().includes(q)||p.codice.toLowerCase().includes(q));
  const el=document.getElementById('lista-prodotti');
  if(!list.length){el.innerHTML='<div class="empty"><span class="empty-snail">🐌</span>Nessun prodotto trovato</div>';return;}
  el.innerHTML=list.map(p=>{
    return `<div class="prod-card">
      <div class="prod-card-header">
        <div class="card-snail">🐌</div>
        <div class="prod-nome">${p.nome}</div>
        <div class="prod-cod-row">
          <span class="prod-cod">${p.codice}</span>
          ${p.unita?`<span class="prod-unita">${p.unita}</span>`:''}
        </div>
      </div>
      <div class="prod-card-body">
        <div class="section-lbl">📊 Struttura costi</div>
        <div class="cost-row">
          <div class="cost-box cb-cvu"><div class="cb-lbl">CVU</div><div class="cb-val">${e(p.cvu)}</div></div>
          <div class="cost-box cb-cfu"><div class="cb-lbl">CFU</div><div class="cb-val">${e(p.cfu)}</div></div>
          <div class="cost-box cb-ct"><div class="cb-lbl">CT</div><div class="cb-val">${e(p.costo_tot)}</div></div>
        </div>
        <div class="cost-row">
          <div class="cost-box cb-ct2"><div class="cb-lbl">CT2</div><div class="cb-val">${e(p.ct2)}</div></div>
          <div class="cost-box cb-na"></div>
          <div class="cost-box cb-na"></div>
        </div>
        <div class="prod-divider"></div>
        <div class="section-lbl">💰 Prezzi</div>
        <div class="prezzo-row">
          <div class="cost-box cb-pc" style="padding:9px 8px"><div class="cb-lbl">Prezzo cons.</div><div class="cb-val">${e(p.prezzo_consigliato)}</div></div>
          <div class="cost-box cb-ct1" style="padding:9px 8px"><div class="cb-lbl">P. Medio 2025</div><div class="cb-val">${e(p.p_medio_2025)}</div></div>
        </div>
      </div>
      <div style="padding:8px 12px 12px;display:flex;gap:8px">
        <button onclick="editProdotto('${p.id}')" style="flex:1;padding:8px;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:10px;font-size:13px;cursor:pointer">✏️ Modifica</button>
        <button onclick="eliminaProdotto('${p.id}','${p.nome.replace(/'/g,"\'")}' )" style="padding:8px 14px;background:#fff0f0;border:1px solid #ffcccc;border-radius:10px;font-size:13px;cursor:pointer;color:#c0392b">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function renderDettaglio(q){
  q=(q||'').toLowerCase();
  const list=DB.filter(p=>(p.nome.toLowerCase().includes(q)||p.codice.toLowerCase().includes(q))&&Object.keys(p.dettaglio).length>0);
  const el=document.getElementById('lista-dettaglio');
  if(!list.length){el.innerHTML='<div class="empty"><span class="empty-snail">🐌</span>Nessun prodotto trovato</div>';return;}
  el.innerHTML=list.map((p,i)=>`<div class="det-card">
    <div class="det-card-hd" onclick="toggleDet('db${i}',this)">
      <div class="det-card-snail">🐌</div>
      <div style="flex:1;min-width:0">
        <div class="det-cod">${p.codice}</div>
        <div class="det-nome">${p.nome}</div>
      </div>
      <button class="det-toggle" tabindex="-1">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
    <div class="det-body" id="db${i}">
      ${Object.entries(p.dettaglio).map(([cat,v])=>`
        <div class="det-cat-block">
          <span class="det-cat-label ${CAT_CLS[cat]||'cat-gd'}"><span class="det-cat-snail">🐌</span>${cat}</span>
          <div class="price-grid">
            <div class="price-box pb-min"><div class="pb-lbl">Minimo</div><div class="pb-val">${e(v.min)}</div></div>
            <div class="price-box pb-medio"><div class="pb-lbl">Medio</div><div class="pb-val">${e(v.medio)}</div></div>
            <div class="price-box pb-max"><div class="pb-lbl">Massimo</div><div class="pb-val">${e(v.max)}</div></div>
          </div>
          <button onclick="editDettaglio('${p.codice}','${p.nome}','${cat}')" style="width:100%;margin-top:6px;padding:7px;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:8px;font-size:12px;cursor:pointer">✏️ Modifica prezzi</button>
          <button onclick="eliminaDettaglio('${p.codice}','${cat}')" style="width:100%;margin-top:4px;padding:7px;background:#fff0f0;border:1px solid #ffcccc;border-radius:8px;font-size:12px;cursor:pointer;color:#c0392b">🗑️ Elimina categoria</button>
        </div>`).join('')}
    </div>
  </div>`).join('');
}

function toggleDet(bid,hd){
  const b=document.getElementById(bid);
  const btn=hd.querySelector('.det-toggle');
  const open=b.classList.toggle('open');
  btn.classList.toggle('open',open);
  hd.classList.toggle('open',open);
}

function buildCatPills(){
  document.getElementById('cat-pills').innerHTML=CATEGORIE.map(c=>`<button class="pill${c===selCat?' active':''}" data-cat="${c}" onclick="selCat=this.dataset.cat;buildCatPills();document.getElementById('clienti-search').value='';renderClienti('')">${c}</button>`).join('');
}

function renderClienti(q){
  q=(q||'').toLowerCase();
  const list=CLIENTI.filter(c=>c.categoria===selCat&&(c.nome.toLowerCase().includes(q)||(c.localita||'').toLowerCase().includes(q)));
  const el=document.getElementById('lista-clienti');
  document.getElementById('clienti-count').textContent=`${list.length} client${list.length===1?'e':'i'} in questa categoria`;
  if(!list.length){el.innerHTML='<div class="empty"><span class="empty-snail">🐌</span>Nessun cliente trovato</div>';return;}

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
(function(){
  var btn = document.getElementById('import-btn');
  var inp = document.getElementById('xl-file');
  var msg = document.getElementById('imsg');

  function log(t,c){ msg.textContent=t; msg.style.color=c||'#555'; }
  function n(v){ try{ if(v==null||v===undefined||v==='')return 0; var s=String(v).replace(',','.').replace(/[^0-9.-]/g,''); var f=parseFloat(s); return isNaN(f)?0:Math.round(f*100)/100; }catch(e){return 0;} }

  function sendBatch(sheet, rows, onDone, onErr) {
    var batchSize = 20; var i = 0;
    function next() {
      if (i >= rows.length) { onDone(); return; }
      var batch = rows.slice(i, i + batchSize);
      var promises = batch.map(function(row) {
        try {
          var url = GAS_URL + '?action=write&data=' + encodeURIComponent(JSON.stringify({action:'saveRow', sheet:sheet, data:row}));
          return fetch(url).then(function(r){ return r.json(); }).catch(function(){ return {ok:true}; });
        } catch(e) { return Promise.resolve({ok:true}); }
      });
      Promise.all(promises).then(function() {
        i += batchSize;
        log('⏳ Invio ' + sheet + ': ' + Math.min(i, rows.length) + '/' + rows.length + '...', '#555');
        setTimeout(next, 300);
      }).catch(onErr);
    }
    next();
  }

  btn.addEventListener('click', function(){ inp.click(); });
  inp.addEventListener('change', function(){
    var file = inp.files[0];
    if (!file) return;
    log('⏳ Lettura file...', '#555');
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var wb = XLSX.read(e.target.result, {type:'array'});

        // Foglio prodotti: alimentare (2)
        var aliSheet = wb.SheetNames.find(function(s){ return s.toLowerCase().includes('alimentare'); }) || wb.SheetNames[0];
        var ws = wb.Sheets[aliSheet];
        var rows = XLSX.utils.sheet_to_json(ws, {header:1});
        var headers = rows[0];
        var colMap = {};
        headers.forEach(function(h, i){ if(h) colMap[String(h).trim().toUpperCase().replace(/\s+/g,'_')] = i; });
        function col(row, name){ var key=name.trim().toUpperCase().replace(/\s+/g,'_'); return colMap[key]!==undefined ? row[colMap[key]] : null; }

        var newProdotti = [];
        for (var r = 1; r < rows.length; r++) {
          var row = rows[r];
          var cod = col(row, 'CD_AR');
          if (!cod || typeof cod !== 'string' || !cod.trim()) continue;
          var ct = n(col(row,'COSTO_TOT')||col(row,'COSTO TOT'));
          var pc = n(col(row,'PREZZO_CONSIGLIATO')||col(row,'PREZZO CONSIGLIATO'));
          var pmedio = n(col(row,'P_MEDIO_2025')||col(row,'P__MEDIO_2025_')||col(row,'P_ MEDIO 2025 ')||0);
          newProdotti.push({
            id: String(r), codice: cod.trim(),
            nome: String(col(row,'AR_DESCRIZIONE')||col(row,'AR_Descrizione')||''),
            unita: String(col(row,'CD_ARMISURA')||col(row,'Cd_ARMisura')||'NR').toUpperCase(),
            cvu: n(col(row,'CVU')), cfu: n(col(row,'CFU')),
            costo_tot: ct, ct2: n(col(row,'CT2')),
            p_medio_2025: pmedio, prezzo_consigliato: pc,
            profitto_consigliato: Math.round((pc-ct)*100)/100
          });
        }

        // Foglio dettaglio: DETTAGLIO
        var detSheet = wb.SheetNames.find(function(s){ return s.toUpperCase().includes('DETTAGLIO'); });
        var newDettaglio = [];
        if (detSheet) {
          var ws2 = wb.Sheets[detSheet];
          var rows2 = XLSX.utils.sheet_to_json(ws2, {header:1});
          var h2 = rows2[0];
          var cm2 = {}; h2.forEach(function(h,i){ if(h) cm2[String(h).trim().toUpperCase().replace(/\s+/g,'_')] = i; });
          function col2(row, name){ var key=name.trim().toUpperCase().replace(/\s+/g,'_'); return cm2[key]!==undefined ? row[cm2[key]] : null; }
          for (var r2 = 1; r2 < rows2.length; r2++) {
            var row2 = rows2[r2];
            var cod2 = col2(row2,'CODICE'); var cat = col2(row2,'CATEGORIA_CLIENTE')||col2(row2,'CATEGORIA CLIENTE');
            if (!cod2 || !cat) continue;
            var detId = String(cod2).trim() + '_' + String(cat).trim().replace(/[^a-zA-Z0-9]/g,'_');
            newDettaglio.push({
              id: detId, codice: String(cod2).trim(), categoria: String(cat).trim(),
              prezzo_min: n(col2(row2,'PREZZO_MIN_(€)')||col2(row2,'PREZZO MIN (€)')),
              prezzo_medio: n(col2(row2,'PREZZO_MEDIO_(€)')||col2(row2,'PREZZO MEDIO (€)')),
              prezzo_max: n(col2(row2,'PREZZO_MAX_(€)')||col2(row2,'PREZZO MAX (€)')),
              qty: 0, fatturato: 0
            });
          }
        }

        log('⏳ Invio ' + newProdotti.length + ' prodotti...', '#555');
        sendBatch('prodotti', newProdotti, function() {
          log('⏳ Invio ' + newDettaglio.length + ' dettagli...', '#555');
          sendBatch('dettaglio', newDettaglio, function() {
            log('✅ ' + newProdotti.length + ' prodotti e ' + newDettaglio.length + ' dettagli aggiornati!', '#2D7A4A');
            setTimeout(function(){ log(''); loadFromGAS(); }, 2000);
          }, function(err){ log('Errore dettaglio: ' + err.message, 'red'); });
        }, function(err){ log('Errore prodotti: ' + err.message, 'red'); });

      } catch(err){ log('Errore: ' + err.message, 'red'); }
      inp.value = '';
    };
    reader.readAsArrayBuffer(file);
  });
})();
</script>

<script>
var GAS_URL = "https://script.google.com/macros/s/AKfycbwfvSW6w5ohPWwBepqbHr76DamrYyxJNYit0iv5y8stLf10-mhxHbgox_LuEWDoZMkFTg/exec";

function gasPost(payload, onOk, onErr) {
  // Use no-cors fetch - GAS redirects POST to GET which loses body
  // So we encode payload as a GET parameter instead
  var url = GAS_URL + '?action=write&data=' + encodeURIComponent(JSON.stringify(payload));
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(d){if(d.ok && onOk) onOk(); else if(onErr) onErr(JSON.stringify(d));})
    .catch(function(e){if(onErr) onErr(e.message);});
}

function loadFromGAS() {
  var loading = document.getElementById('loading');
  fetch(GAS_URL + '?action=getData&t=' + Date.now())
    .then(function(r){return r.json();})
    .then(function(data){

      // Prodotti: usa GAS se ha dati, altrimenti usa embedded
      var gasProdotti = data.prodotti || [];
      if (gasProdotti.length > 0) {
        DB.length = 0;
        gasProdotti.forEach(function(p){
          var ct = Number(p.costo_tot)||0, pc = Number(p.prezzo_consigliato)||0;
          DB.push({
            id: String(p.id), codice: p.codice||'', nome: p.nome||'',
            unita: (p.unita||'NR').toUpperCase(),
            cvu: Number(p.cvu)||0, cfu: Number(p.cfu)||0,
            costo_tot: ct, ct1: Number(p.ct1)||0, ct2: Number(p.ct2)||0,
            listino_grossisti: Number(p.listino_grossisti)||0,
            listino_vendita_diretta: Number(p.listino_vendita_diretta)||0,
            p_medio_2025: Number(p.p_medio_2025)||0,
            prezzo_consigliato: pc,
            profitto_consigliato: Math.round((pc-ct)*100)/100,
            dettaglio: {}
          });
        });
      }

      // Dettaglio: sovrascrive su prodotti
      var gasDettaglio = data.dettaglio || [];
      gasDettaglio.forEach(function(d){
        if (!d.codice || !d.categoria) return;
        var prod = DB.find(function(x){ return x.codice===String(d.codice); });
        if (prod) {
          if (!prod.dettaglio) prod.dettaglio = {};
          prod.dettaglio[String(d.categoria)] = {
            min: Number(d.prezzo_min)||0,
            medio: Number(d.prezzo_medio)||0,
            max: Number(d.prezzo_max)||0
          };
        }
      });

      // Clienti: merge GAS + embedded
      var gasClienti = (data.clienti || []).map(function(c){
        return {id: String(c.id), nome: c.nome||'', localita: c.citta||'',
          provincia: '', categoria: c.categoria||'',
          telefono: c.telefono||'', email: c.email||'', prodotti: []};
      });
      gasClienti.forEach(function(gc){
        var ex = CLIENTI.find(function(x){ return x.id===gc.id; });
        if (!ex) { CLIENTI.push(gc); }
        else {
          ex.nome = gc.nome||ex.nome; ex.localita = gc.localita||ex.localita;
          ex.categoria = gc.categoria||ex.categoria;
          ex.telefono = gc.telefono||ex.telefono; ex.email = gc.email||ex.email;
        }
      });

      var ps = document.getElementById('hc-prod-sub');
      var cs = document.getElementById('hc-cli-sub');
      if (ps) ps.textContent = DB.length + ' prodotti · CVU, CFU, CT, prezzi';
      if (cs) cs.textContent = CLIENTI.length + ' clienti · ' + CATEGORIE.length + ' categorie';
      var lu = document.getElementById('last-update');
      if (lu) { var d2=new Date(); lu.textContent='Aggiornato: '+d2.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}); }
      var btn = document.getElementById('refresh-btn');
      if (btn) { btn.textContent='🔄 Aggiorna'; btn.disabled=false; }
      if (loading) { loading.style.opacity='0'; setTimeout(function(){loading.style.display='none';},500); }
      buildCatPills();
      showPage('home');
    })
    .catch(function(err){
      // Fallback: usa dati embedded
      var btn = document.getElementById('refresh-btn');
      if (btn) { btn.textContent='🔄 Aggiorna'; btn.disabled=false; }
      if (loading) { loading.style.opacity='0'; setTimeout(function(){loading.style.display='none';},500); }
      var ps = document.getElementById('hc-prod-sub');
      if (ps) ps.textContent = DB.length + ' prodotti · CVU, CFU, CT, prezzi';
      buildCatPills();
      showPage('home');
    });
}

function refreshData() {
  var btn = document.getElementById('refresh-btn');
  if (btn) { btn.textContent='⏳ Caricamento...'; btn.disabled=true; }
  loadFromGAS();
}

  ];
  var inputs = fields.map(function(f){

      '<input id="ef_'+f.k+'" value="" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:14px;box-sizing:border-box"></div>';
  }).join('');
  modal.innerHTML = '<div style="background:white;border-radius:16px;padding:20px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto">' +
    '<div style="font-weight:700;font-size:16px;margin-bottom:14px">➕ Nuovo prodotto</div>' +
    inputs +
    '<div style="display:flex;gap:8px;margin-top:16px">' +
    '<button id="m-cancel" style="flex:1;padding:10px;background:#f0f0f0;border:none;border-radius:10px;font-size:14px;cursor:pointer">Annulla</button>' +
    '<button id="m-save" style="flex:1;padding:10px;background:#2D7A4A;color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer">Salva</button>' +
    '</div></div>';
  modal.style.display = 'flex';
  document.getElementById('m-cancel').onclick = function(){ modal.style.display='none'; };
  document.getElementById('m-save').onclick = function() {
    var data = {id: newId};
    fields.forEach(function(f){
      var v = document.getElementById('ef_'+f.k).value;
      data[f.k] = f.str ? v : (isNaN(Number(v)) ? 0 : Number(v));
    });
    if (!data.codice) { alert('Il codice è obbligatorio'); return; }
    var btn = document.getElementById('m-save');
    btn.textContent='⏳'; btn.disabled=true;
    gasPost({action:'saveRow', sheet:'prodotti', data:data}, function(){
      // Aggiungi al DB locale subito
      data.dettaglio = {};
      var exists = DB.findIndex(function(x){ return x.codice===data.codice; });
      if (exists >= 0) { DB[exists] = data; } else { DB.push(data); }
      var ps = document.getElementById('hc-prod-sub');
      if (ps) ps.textContent = DB.length + ' prodotti · CVU, CFU, CT, prezzi';
      modal.style.display='none'; loadFromGAS();

  };
}
